<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - World Cup Predictor</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="error-page">
    <main class="reset-shell">
      <section class="auth-panel reset-panel">
        <form id="forgotForm" class="reset-form" novalidate>
          <div class="auth-copy">
            <h2>Reset your password</h2>
            <p>Enter your account email, then contact the administrator to receive your reset link.</p>
          </div>
          <label>
            <span>Email</span>
            <input id="resetEmail" name="email" type="email" autocomplete="email" spellcheck="false" required>
          </label>
          <div class="auth-actions">
            <button type="submit">Request reset</button>
            <a class="button-link ghost-link" href="login.html">Back to login</a>
          </div>
          <p id="forgotMessage" class="form-message" role="status"></p>
        </form>
      </section>
    </main>
    <script src="forgot-password.js"></script>
  </body>
</html>
