<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log In - World Cup Predictor</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page" data-auth-mode="login">
    <header class="auth-header">
      <a class="brand brand-link" href="index.html">
        <span class="brand-mark" aria-hidden="true">WC</span>
        <span>World Cup Predictor</span>
      </a>
    </header>
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="authTitle">
        <div class="auth-copy">
          <p class="eyebrow">Welcome back</p>
          <h1 id="authTitle">Log in</h1>
          <p>Continue with your saved predictions.</p>
        </div>
        <form id="authForm" class="auth-page-form" novalidate>
          <label>
            <span>Email</span>
            <input id="emailInput" name="email" type="email" autocomplete="email" spellcheck="false" aria-describedby="emailError">
            <span id="emailError" class="field-error" aria-live="polite"></span>
          </label>
          <label>
            <span>Password</span>
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" aria-describedby="passwordError">
            <span id="passwordError" class="field-error" aria-live="polite"></span>
          </label>
          <button id="authSubmit" type="submit">Log in</button>
          <p id="authMessage" class="form-message" role="status"></p>
        </form>
        <div class="auth-links">
          <a href="forgot-password.html">Forgot password?</a>
          <span>New here? <a href="register.html">Create an account</a></span>
        </div>
      </section>
    </main>
    <script src="auth.js"></script>
  </body>
</html>
