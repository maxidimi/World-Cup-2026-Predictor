name: Build and deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Sign in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          provenance: false
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Push image
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          SHA_TAG: ${{ github.sha }}
        run: |
          push_with_retry() {
            local tag="$1"
            local attempt
            for attempt in 1 2 3; do
              if docker push "$tag"; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Push attempt $attempt failed for $tag. Retrying in $((attempt * 10)) seconds..."
                sleep $((attempt * 10))
              fi
            done
            return 1
          }

          push_with_retry "$IMAGE:$SHA_TAG"
          push_with_retry "$IMAGE:latest"

  deploy:
    needs: build
    if: ${{ vars.AZURE_RESOURCE_GROUP != '' && vars.AZURE_CONTAINER_APP_NAME != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image revision
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade
            az containerapp update \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --image "${{ needs.build.outputs.image }}:${{ github.sha }}" \
              --output none
