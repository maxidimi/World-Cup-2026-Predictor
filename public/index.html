<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>World Cup Predictor</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="hero">
      <nav class="topbar" aria-label="Primary">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">WC</span>
          <span>World Cup Predictor</span>
        </div>
        <div class="topbar-right">
          <div class="page-nav" aria-label="Pages">
            <a class="nav-link active" href="index.html" aria-current="page">Predictions</a>
            <a class="nav-link" href="leaderboard.html">Leaderboard</a>
            <a class="nav-link" href="teams.html">My teams</a>
          </div>
          <div class="session">
            <div id="guestActions" class="session-actions hidden">
              <a class="ghost-link" href="login.html">Log in</a>
            </div>
            <button id="logoutBtn" class="ghost hidden" type="button">Log out</button>
          </div>
        </div>
      </nav>
      <section class="hero-content">
        <p class="eyebrow">World Cup 2026</p>
        <h1>Match predictions</h1>
        <p class="lede">Browse fixtures, save scores, and track your predictions.</p>
      </section>
    </header>

    <main>
      <section class="controls" aria-label="Match filters">
        <div class="view-control">
          <span class="control-label">Group by</span>
          <div class="segmented" role="group" aria-label="Group matches by">
            <button class="segment active" data-group="date" type="button">Date</button>
            <button class="segment" data-group="team" type="button">Team</button>
            <button class="segment" data-group="phase" type="button">Phase</button>
          </div>
        </div>
        <div class="control-fields">
          <label>
            <span>Find a match</span>
            <input id="searchInput" type="search" placeholder="Search team or venue">
          </label>
          <label>
            <span>Stage</span>
            <select id="phaseFilter">
              <option value="all">All stages</option>
            </select>
          </label>
          <label>
            <span>Team</span>
            <select id="teamFilter">
              <option value="all">All teams</option>
            </select>
          </label>
          <button id="clearFiltersBtn" class="ghost clear-filters" type="button">Clear</button>
        </div>
      </section>

      <section class="summary" aria-label="Prediction summary">
        <div>
          <strong id="matchCount">0</strong>
          <span>matches</span>
        </div>
        <div>
          <strong id="savedCount">0</strong>
          <span>saved predictions</span>
        </div>
        <div>
          <strong id="activeView">Date</strong>
          <span>active view</span>
        </div>
      </section>

      <section id="matches" class="matches" aria-live="polite"></section>
    </main>

    <template id="matchTemplate">
      <article class="match-card">
        <div class="match-meta">
          <span class="badge phase"></span>
          <span class="date"></span>
        </div>
        <form class="prediction" aria-label="Prediction">
          <div class="scoreboard">
            <strong class="home"></strong>
            <input class="home-score" type="number" inputmode="numeric" min="0" max="30" placeholder="0" aria-label="Home score">
            <span aria-hidden="true">:</span>
            <input class="away-score" type="number" inputmode="numeric" min="0" max="30" placeholder="0" aria-label="Away score">
            <strong class="away"></strong>
          </div>
          <p class="venue"></p>
          <button type="submit">Save</button>
        </form>
        <p class="prediction-state"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
