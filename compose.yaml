services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://host.docker.internal:27017}
      MONGODB_DB: world_cup_predictor
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env before running docker compose}
      FOOTBALL_DATA_TOKEN: ${FOOTBALL_DATA_TOKEN:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  prometheus-data:
