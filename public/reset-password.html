<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password - World Cup Predictor</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <script src="theme.js"></script>
    <script src="i18n.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="error-page">
    <main class="reset-shell">
      <section class="auth-panel reset-panel">
        <form id="resetForm" class="reset-form" novalidate>
          <div class="auth-copy">
            <h2>Choose a new password</h2>
            <p>Reset links expire after 15 minutes and can be used once.</p>
          </div>
          <label>
            <span>New password</span>
            <input id="newPassword" name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label>
            <span>Confirm password</span>
            <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <div class="auth-actions">
            <button type="submit">Update password</button>
            <a class="button-link ghost-link" href="login.html">Back to login</a>
          </div>
          <p id="resetMessage" class="form-message" role="status"></p>
        </form>
      </section>
    </main>
    <script src="reset-password.js"></script>
  </body>
</html>
